<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc6dd"/>
      <stop offset="0.55" stop-color="#a9dbe7"/>
      <stop offset="1" stop-color="#cfe9df"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#sky)"/>

  <!-- soft pixel clouds -->
  <g fill="#ffffff" opacity="0.85">
    <rect x="36" y="42" width="74" height="16" rx="8"/>
    <rect x="52" y="32" width="42" height="14" rx="7"/>
    <rect x="300" y="58" width="94" height="18" rx="9"/>
    <rect x="322" y="46" width="56" height="14" rx="7"/>
    <rect x="180" y="26" width="56" height="12" rx="6"/>
    <rect x="410" y="34" width="56" height="14" rx="7"/>
  </g>

  <!-- distant mountains -->
  <g fill="#7d97b3" opacity="0.7">
    <polygon points="60,178 160,72 260,178"/>
    <polygon points="220,178 320,92 420,178"/>
    <polygon points="360,178 440,112 480,160 480,178"/>
  </g>
  <g fill="#5f7794" opacity="0.55">
    <polygon points="0,178 90,112 180,178"/>
    <polygon points="280,178 380,122 470,178"/>
  </g>

  <!-- ground -->
  <rect x="0" y="172" width="480" height="98" fill="#7bbf6a"/>
  <rect x="0" y="172" width="480" height="9" fill="#6aab5c"/>

  <!-- autumn trees -->
  <g>
    <rect x="36" y="150" width="6" height="28" fill="#6b4a2b"/>
    <circle cx="39" cy="146" r="20" fill="#e08a2e"/>
    <rect x="430" y="150" width="6" height="28" fill="#6b4a2b"/>
    <circle cx="433" cy="146" r="22" fill="#df7e2a"/>
    <rect x="95" y="158" width="5" height="22" fill="#6b4a2b"/>
    <circle cx="97" cy="154" r="15" fill="#e8a13e"/>
    <rect x="385" y="156" width="5" height="22" fill="#6b4a2b"/>
    <circle cx="387" cy="152" r="16" fill="#eaa63f"/>
  </g>
</svg>
